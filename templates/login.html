{% extends 'layout.html' %} 
{% block title %} Home {% endblock %}
{% load static %}

{% block extra_js %}
<script src="{% static 'js/login.js' %}"></script>
{% endblock %}
{% block content %}
<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-gray-900">Accede a tu cuenta</h2>
    <div class="tabs">
      <div class="flex overflow-hidden rounded-3xl border border-gray-200 bg-white p-1 shadow-sm mb-6">
        <button id="tab-clientes"
          type="button"
          class="tab-btn flex-1 rounded-2xl px-4 py-3 text-sm font-semibold text-white bg-idiet transition"
          onclick="changeTab('clientes')"
          data-tab="clientes">
          Clientes
        </button>

        <button id="tab-formacion"
          type="button"
          class="tab-btn flex-1 rounded-2xl px-4 py-3 text-sm font-semibold text-idiet bg-secondary/10 transition hover:bg-secondary/20"
          onclick="changeTab('formacion')"
          data-tab="formacion">
          Formación
        </button>
      </div>
    </div>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form action="#" method="POST" class="space-y-6 rounded-3xl bg-white p-8 shadow-xl ring-1 ring-gray-200">
        {% csrf_token %}
        <input type="hidden" name="user_type" id="user_type" value="clientes" />
      <div>
        <label for="email" class="block text-sm/6 font-medium text-gray-900 ">Email address</label>
        <div class="mt-2">
          <input id="email" type="email" name="email" required autocomplete="email" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="password" class="block text-sm/6 font-medium text-gray-900">Contraseña</label>
          <div class="text-sm">
            <a href="#" class="font-semibold text-idiet hover:text-idiet/80">¿Olvidaste tu contraseña?</a>
          </div>
        </div>
        <div class="mt-2">
          <input id="password" type="password" name="password" required autocomplete="current-password" class="block w-full rounded-2xl border border-gray-200 bg-gray-50 px-3 py-3 text-base text-gray-900 shadow-sm outline-none focus:border-idiet focus:ring-2 focus:ring-idiet/20 sm:text-sm/6" />
        </div>
      </div>

      <div>
        <button type="submit" class="flex w-full justify-center rounded-2xl bg-idiet px-4 py-3 text-sm/6 font-semibold text-white shadow-md transition hover:bg-idiet/90 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-idiet">Iniciar sesión</button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
