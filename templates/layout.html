<!DOCTYPE html>
<html lang="en">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'dist/style.css' %}" />
    <title>{% block title %} I-diet {% endblock %}</title>
  </head>
  <body>
    <header class="bg-white">
      <nav aria-label="Global" class="mx-auto flex items-center justify-between p-6 lg:px-8 bg-idiet">
        <div class="flex lg:flex-1">
      <a href="#" class="-m-1.5 p-1.5">
        <span class="sr-only">I-diet</span>
        <img src="https://www.i-diet.es/www/app_dev/img/logo-idiet-login.png" alt="" class="h-8 w-auto" />
      </a>
    </div>
        <div class="flex lg:hidden">
          <button type="button" command="show-modal" commandfor="mobile-menu" class="-m-2.5 inline-flex items-center justify-center rounded-md p-2.5 text-gray-700">
            <span class="sr-only">Open main menu</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="size-6">
              <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
        <div class="hidden lg:flex lg:gap-x-12">
          <a href="#" class="text-lg/6 font-semibold text-white">Suscripcion</a>
          <a href="#" class="text-lg/6 font-semibold text-white">Contacto</a>
        </div>
        <div class="hidden lg:flex lg:flex-1 lg:justify-end">
          <a href="#" class="text-lg/6 font-semibold text-white me-3">Acceso</a>
        </div>
      </nav>
      <el-dialog>
        <dialog id="mobile-menu" class="backdrop:bg-transparent lg:hidden">
          <div tabindex="0" class="fixed inset-0 focus:outline-none">
            <el-dialog-panel class="fixed inset-y-0 right-0 z-50 w-full overflow-y-auto bg-white p-6 sm:max-w-sm sm:ring-1 sm:ring-gray-900/10">
              <div class="flex items-center justify-between">
                <a href="#" class="-m-1.5 p-1.5">
                  <span class="sr-only">Your Company</span>
                  <img src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=600" alt="" class="h-8 w-auto" />
                </a>
                <button type="button" command="close" commandfor="mobile-menu" class="-m-2.5 rounded-md p-2.5 text-gray-700">
                  <span class="sr-only">Close menu</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="size-6">
                    <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                </button>
              </div>
              <div class="mt-6 flow-root">
                <div class="-my-6 divide-y divide-gray-500/10">
                  <div class="space-y-2 py-6">
                    <a href="#" class="-mx-3 block rounded-lg px-3 py-2 text-base/7 font-semibold text-gray-900 hover:bg-gray-50">Product</a>
                    <a href="#" class="-mx-3 block rounded-lg px-3 py-2 text-base/7 font-semibold text-gray-900 hover:bg-gray-50">Features</a>
                    <a href="#" class="-mx-3 block rounded-lg px-3 py-2 text-base/7 font-semibold text-gray-900 hover:bg-gray-50">Marketplace</a>
                    <a href="#" class="-mx-3 block rounded-lg px-3 py-2 text-base/7 font-semibold text-gray-900 hover:bg-gray-50">Company</a>
                  </div>
                  <div class="py-6">
                    <a href="#" class="-mx-3 block rounded-lg px-3 py-2.5 text-base/7 font-semibold text-gray-900 hover:bg-gray-50">Log in</a>
                  </div>
                </div>
              </div>
            </el-dialog-panel>
          </div>
        </dialog>
      </el-dialog>
    </header>

    {% block content %} {% endblock %}
  </body>
  <footer class="bg-idiet">
  <div class="mx-auto max-w-7xl overflow-hidden px-6 py-20 sm:py-24 lg:px-8">
    <nav aria-label="Footer" class="-mb-6 flex flex-wrap justify-center gap-x-12 gap-y-3 text-sm/6">
      <a href="#" class="text-white hover:text-gray-900">About</a>
      <a href="#" class="text-white hover:text-gray-900">Blog</a>
      <a href="#" class="text-white hover:text-gray-900">Jobs</a>
      <a href="#" class="text-white hover:text-gray-900">Press</a>
      <a href="#" class="text-white hover:text-gray-900">Accessibility</a>
      <a href="#" class="text-white hover:text-gray-900">Partners</a>
    </nav>
    <div class="mt-16 flex justify-center gap-x-10">
      <a href="https://www.facebook.com/comerconcabeza" class="text-white hover:text-gray-800" target="_blank">
        <span class="sr-only">Facebook</span>
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" class="size-6">
          <path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" clip-rule="evenodd" fill-rule="evenodd" />
        </svg>
      </a>
      <a href="https://x.com/comerconcabeza" class="text-white hover:text-gray-800" target="_blank">
        <span class="sr-only">X</span>
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" class="size-6">
          <path d="M13.6823 10.6218L20.2391 3H18.6854L12.9921 9.61788L8.44486 3H3.2002L10.0765 13.0074L3.2002 21H4.75404L10.7663 14.0113L15.5685 21H20.8131L13.6819 10.6218H13.6823ZM11.5541 13.0956L10.8574 12.0991L5.31391 4.16971H7.70053L12.1742 10.5689L12.8709 11.5655L18.6861 19.8835H16.2995L11.5541 13.096V13.0956Z" />
        </svg>
      </a>
    </div>
    <div class="mt-16 flex justify-center gap-x-10">
      <div><a href="https://www.portalesmedicos.com/web_interes_sanitario/160079.htm" target="_blank"><img src="https://www.portalesmedicos.com/web_interes_sanitario/logo_wis_130x50.jpg" style="border-width: 0px" /></a></div>
    </div>
    <p class="mt-10 text-center text-sm/6 text-white">&copy; {% now "Y" %} I-Diet, All rights reserved.</p>
  </div>
</footer>

</html>
